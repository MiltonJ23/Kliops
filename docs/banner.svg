<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e3b341"/>
      <stop offset="100%" stop-color="#d29922"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
  </g>

  <!-- Decorative circuit lines -->
  <g stroke="#1f6feb" stroke-width="1" opacity="0.15" fill="none">
    <path d="M 60 200 L 160 200 L 160 120 L 280 120"/>
    <path d="M 60 240 L 120 240 L 120 300 L 240 300"/>
    <path d="M 920 100 L 1020 100 L 1020 180 L 1140 180"/>
    <path d="M 960 300 L 1060 300 L 1060 240 L 1140 240"/>
    <circle cx="280" cy="120" r="3" fill="#1f6feb"/>
    <circle cx="240" cy="300" r="3" fill="#1f6feb"/>
    <circle cx="1140" cy="180" r="3" fill="#1f6feb"/>
    <circle cx="1140" cy="240" r="3" fill="#1f6feb"/>
  </g>

  <!-- Left architectural element: hexagonal ports-and-adapters symbol -->
  <g transform="translate(150, 200)" opacity="0.12">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#58a6ff" stroke-width="0.8"/>
  </g>

  <!-- Right architectural element: vector space dots -->
  <g transform="translate(1050, 200)" opacity="0.12">
    <circle cx="-30" cy="-40" r="2.5" fill="#58a6ff"/>
    <circle cx="10" cy="-55" r="2" fill="#58a6ff"/>
    <circle cx="40" cy="-20" r="3" fill="#58a6ff"/>
    <circle cx="-50" cy="10" r="2" fill="#58a6ff"/>
    <circle cx="20" cy="15" r="2.5" fill="#58a6ff"/>
    <circle cx="-10" cy="40" r="2" fill="#58a6ff"/>
    <circle cx="50" cy="35" r="1.5" fill="#58a6ff"/>
    <circle cx="-40" cy="-20" r="1.5" fill="#58a6ff"/>
    <circle cx="30" cy="55" r="2" fill="#58a6ff"/>
    <circle cx="-20" cy="60" r="1.5" fill="#58a6ff"/>
    <line x1="-30" y1="-40" x2="10" y2="-55" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="10" y1="-55" x2="40" y2="-20" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="-30" y1="-40" x2="-50" y2="10" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="40" y1="-20" x2="20" y2="15" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="-50" y1="10" x2="-10" y2="40" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="20" y1="15" x2="50" y2="35" stroke="#58a6ff" stroke-width="0.5"/>
  </g>

  <!-- Top accent line -->
  <rect x="350" y="80" width="500" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="155" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="64" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="8">KLIOPS</text>

  <!-- Subtitle -->
  <text x="600" y="200" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="3">AGENTIC RFP RESPONSE ENGINE</text>

  <!-- Divider -->
  <rect x="450" y="220" width="300" height="1" rx="0.5" fill="url(#gold)" opacity="0.4"/>

  <!-- Description line 1 -->
  <text x="600" y="258" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Hexagonal architecture in Go. Knowledge extraction via Gemma.</text>

  <!-- Description line 2 -->
  <text x="600" y="280" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Semantic retrieval with mxbai-embed-large and Qdrant.</text>

  <!-- Tech stack pills -->
  <g transform="translate(600, 330)" text-anchor="middle">
    <!-- Go -->
    <rect x="-285" y="-14" width="54" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="-258" y="4" font-family="'SF Mono', monospace" font-size="11" fill="#79c0ff">Go</text>
    <!-- PostgreSQL -->
    <rect x="-220" y="-14" width="90" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="-175" y="4" font-family="'SF Mono', monospace" font-size="11" fill="#79c0ff">PostgreSQL</text>
    <!-- MinIO -->
    <rect x="-120" y="-14" width="60" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="-90" y="4" font-family="'SF Mono', monospace" font-size="11" fill="#79c0ff">MinIO</text>
    <!-- RabbitMQ -->
    <rect x="-50" y="-14" width="80" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="-10" y="4" font-family="'SF Mono', monospace" font-size="11" fill="#79c0ff">RabbitMQ</text>
    <!-- Qdrant -->
    <rect x="40" y="-14" width="66" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="73" y="4" font-family="'SF Mono', monospace" font-size="11" fill="#79c0ff">Qdrant</text>
    <!-- Gemma -->
    <rect x="116" y="-14" width="66" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="149" y="4" font-family="'SF Mono', monospace" font-size="11" fill="#e3b341">Gemma</text>
    <!-- Ollama -->
    <rect x="192" y="-14" width="66" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="225" y="4" font-family="'SF Mono', monospace" font-size="11" fill="#e3b341">Ollama</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="350" y="360" width="500" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Version tag bottom-right -->
  <text x="1160" y="385" font-family="'SF Mono', monospace" font-size="11" fill="#484f58" text-anchor="end">v0.3.0</text>
</svg>
