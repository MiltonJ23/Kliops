name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: true
        default: latest
      namespace:
        description: Kubernetes namespace
        required: true
        default: kliops

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if ! echo "${{ github.event.inputs.namespace }}" | grep -qE '^[a-z0-9][a-z0-9-]{0,62}$'; then
            echo "::error::Invalid namespace format"
            exit 1
          fi
          if ! echo "${{ github.event.inputs.image_tag }}" | grep -qE '^[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid image tag format"
            exit 1
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 --decode > ~/.kube/config
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}

      - name: Render deployment image
        run: |
          sed \
            -e "s|IMAGE_REPOSITORY_PLACEHOLDER|ghcr.io/${{ github.repository_owner }}/kliops|g" \
            -e "s|IMAGE_TAG_PLACEHOLDER|${{ github.event.inputs.image_tag }}|g" \
            -e "s|NAMESPACE_PLACEHOLDER|${{ github.event.inputs.namespace }}|g" \
            deployments/k8s/kliops.yaml > /tmp/kliops-rendered.yaml

      - name: Apply manifests
        run: kubectl apply -f /tmp/kliops-rendered.yaml
