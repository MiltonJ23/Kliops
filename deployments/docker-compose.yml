version: '3.8'



services:
  postgres:
    image: postgres:latest 
    container-name: kliops-postgres
    environment:
      POSTGRES_USER=${POSTGRES_USER}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata :/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kliops_user -d kliops_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  qdrant:
    image: qdrant/qdrant:latest 
    container-name: kliops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage 

volumes:
  pgdata:
  qdrant_data: